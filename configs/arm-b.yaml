# arm-b.yaml — extraction-arms comparison: Arm B, orchestrated (ADR-038)
#
# Arm B (orchestrated / read-then-structure): image -> Granite (reader) -> text
# -> Gemma (structurer) -> JSON -> structurer. The structurer (Gemma) is held
# IDENTICAL to Arm A, so the only variable is whether a specialist reader
# (Granite) precedes it — this isolates the value of specialist reading (ADR-034).
#
# Two-pass design (ADR-038): the reader pass is the baseline-regex.yaml run (it
# writes Granite transcripts to the shared `transcript_archive_dir` below). This
# config drives ONLY the structuring pass (`src/horus/eval/arm_b.py::run_arm_b`),
# which reads those cached transcripts and structures each with Gemma text-only —
# so the structurer prompt can be iterated WITHOUT re-running the reader.
#
# Sequence:
#   1. make pilot-13 CFG=configs/pilot-13.yaml,configs/baseline-regex.yaml   # reader pass
#   2. make arm-b    CFG=configs/pilot-13.yaml,configs/arm-b.yaml            # structuring pass
#
# `reader_model_id` selects the reader whose transcripts are consumed;
# `working_models` is the single structurer; `prompt_template_override` carries
# the structuring instruction (the reader text is appended by run_arm_b).
# dev_only=true (dev-surface only; ADR-034 guardrail).
#
# Refs: ADR-038 (arms mechanism + two-pass Arm B), ADR-034 (the two arms),
# ADR-035 (validate_and_repair), ADR-041 (full-coverage flat fields + VAT
# breakdown + Skonto), ADR-042 (line items + repeating-group scoring),
# ADR-037 (frozen-baseline scope param), ADR-030 (transcripts).

mlflow:
  experiment_name: arm-b-dev
  run_tags:
    stage: extraction-arms
    approach: arm-b-orchestrated
    issue: "91"
    adr: ADR-038

cohort:
  # The structurer (held identical to Arm A — the controlled variable).
  working_models:
    - google/gemma-4-E4B-it
  # The reader whose cached transcripts the structurer consumes (Arm B).
  reader_model_id: ibm-granite/granite-docling-258M-mlx
  adapter_mode: structurer
  invoice_subset:
    - EN16931_Einfach
    - EN16931_Gutschrift
    - EN16931_Miete
    - EN16931_Rabatte
    - EN16931_Innergemeinschaftliche_Lieferungen
    - XRECHNUNG_Einfach
  parent_run_name: arm-b-dev
  # MUST match baseline-regex.yaml's transcript_archive_dir — Arm B reads the
  # Granite transcripts written there by the reader pass, and writes its own
  # Gemma structured outputs alongside (distinct model slug).
  transcript_archive_dir: docs/sources/transcripts-arms-dev
  dev_only: true
  prompt_template_override:
    google/gemma-4-E4B-it: |-
      You are a meticulous accountant extracting fields from a German B2B invoice. The text below was produced by a document-reading model and may contain layout markup or tables. First reason in 2-3 short sentences (do NOT analyze each field one-by-one — that wastes space and risks truncating the JSON), then output ONE JSON object on the final line.

      Rules:
      - Extract ONLY values actually present in the text. If a field is not present, use null (or [] for the array fields). NEVER invent a value (an honest null is correct for the tax domain).
      - Money values exactly as printed (digits + separators). Dates as printed. Percentages as the number (e.g. "19").
      - document_type: one of "invoice", "credit_note", "correction".
      - Addresses: the full postal address as printed (street, postcode, city, country).
      - The array fields hold one object per row ([] or null if the invoice has none):
        vat_breakdown — per VAT rate: {category_code, rate_percent, taxable_amount, tax_amount}
        skonto — early-payment discount tiers: {percent, days, basis_amount}
        line_items — one per product/service line: {line_id, name, seller_assigned_id, net_price, quantity, vat_rate, line_amount}
      - Return EXACTLY these keys: invoice_number, issue_date, invoice_currency_code, delivery_date, document_type, buyer_order_reference, billing_period_start, billing_period_end, seller_name, seller_vat_id, seller_tax_id, seller_gln, seller_address, buyer_name, buyer_reference, buyer_vat_id, buyer_address, payment_due_date, payment_means_code, payment_means_text, seller_iban, seller_bic, seller_account_name, payment_reference, tax_rate, line_total_amount, tax_basis_total_amount, tax_total_amount, grand_total_amount, due_payable_amount, prepaid_amount, allowance_total_amount, charge_total_amount, rounding_amount, vat_breakdown, skonto, line_items, purpose_summary.
      - purpose_summary: one short sentence describing what the invoice is for.
