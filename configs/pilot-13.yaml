# pilot-13.yaml — ADR-014 PR(c) cohort-harness + multi-page-rasterizer config
#
# Master config for the full 26-invoice × 7-working-model cohort sweep that
# produces pilot #13's thesis-defense F1 numbers. Invoked via:
#
#   make pilot-13 CFG=configs/pilot-13.yaml
#   make pilot-13 CFG=configs/pilot-13.yaml INVOICES=EN16931_Einfach,XRECHNUNG_Einfach
#   make pilot-13 CFG=configs/pilot-13.yaml MODELS=opendatalab/MinerU2.5-Pro-2604-1.2B
#
# `tracking_uri: null` triggers MLflow's SQLite default backend (per ADR-011)
# at `sqlite:///mlflow.db` + artifact root `./mlartifacts/`. Override via
# `HORUS_MLFLOW__TRACKING_URI=<uri>` env var per pydantic-settings
# nested-delimiter convention.
#
# Per `horus-config-discipline`: ALL knobs live in this YAML. Adding a new
# knob requires extending `src/horus/config.py`'s `RasterizerConfig` or
# `CohortConfig` Pydantic schemas first. Pydantic fail-fast at boot catches
# drift (missing field, type mismatch, extra unknown key — all raise BEFORE
# rasterization or any model load).
#
# Threshold-sensitivity ablation: sibling configs `pilot-13-tau-03.yaml` +
# `pilot-13-tau-07.yaml` override only `eval.anls_threshold` and
# `mlflow.run_tags.anls_threshold` + `cohort.parent_run_name` — they re-use
# the saved transcripts (the scorer is deterministic on saved transcripts,
# `tests/test_scorer_integration` proves this).
#
# Refs: ADR-014 §Decision (this config's ratifying ADR — forthcoming),
# ADR-013 (parent: scorer + EvalConfig), ADR-012 (parent: GT parser),
# ADR-011 (MLflow tracker integration), ADR-009 (cohort manifest substrate),
# ADR-007 (longest_edge=2048 contract — preserved by 300 DPI rasterization),
# ADR-004 (config-library), horus-config-discipline.md (L2 rule).

seed: 42

mlflow:
  experiment_name: pilot-13-full
  run_tags:
    stage: pilot-13
    corpus: zugferd-full
    cohort: adr-009-pilot-cohort
    rasterizer: pypdfium2
    dpi: "300"
    anls_threshold: "0.5"
    xml_route: facturx
    issue: "13"
    adr: ADR-014
    pr: prc-cohort-harness
  tracking_uri: null

eval:
  # ANLS* threshold (Biten+ ICCV'19): NLS scores below this collapse to 0.0.
  # 0.5 = literature default. Ablation runs override to 0.3 / 0.7 via
  # pilot-13-tau-{03,07}.yaml.
  anls_threshold: 0.5
  money_tolerance_cents: 0
  date_tolerance_days: 0
  string_normalize_nfc: true
  log_excluded_to_dict: true

rasterizer:
  # 300 DPI on A4 ≈ 2480 px width — matches the pre-PR(c)
  # `sips --resampleWidth 2480` baseline at Makefile:89-91. Per-cohort-model
  # `longest_edge=2048` internal resize (ADR-007) is byte-equivalent to the
  # page-1 smoke at this DPI; no per-model recalibration needed.
  dpi: 300
  cache_dir: data/raw/smoke/multipage
  image_format: png

cohort:
  # The 7 working models from ADR-009 Amendment 1 (3 errored models excluded:
  # deepseek-ai/DeepSeek-OCR-2, Qwen/Qwen3-VL-4B-Instruct, allenai/Molmo-7B-D-0924).
  # Order is execution order (transformers-first load → MLX-fallback per
  # cohort_smoke.py loading convention — preserves ADR-009 §3.7 caveats).
  working_models:
    - opendatalab/MinerU2.5-Pro-2604-1.2B    # Cat 1 — TransformersMPS
    - google/paligemma2-3b-mix-448            # Cat 3 — TransformersMPS
    - ibm-granite/granite-docling-258M-mlx    # Cat 1 — MLXVLM
    - allenai/olmOCR-2-7B-1025                # Cat 1 — MLXVLM (4-bit)
    - PaddlePaddle/PaddleOCR-VL               # Cat 2 — MLXVLM (4-bit)
    - zai-org/GLM-OCR                         # Cat 2 — MLXVLM (4-bit)
    - google/gemma-4-E4B-it                   # Cat 3 — MLXVLM (4-bit)
  corpus_root: data/raw/german/zugferd-corpus
  parent_run_name: pilot-13-full
  transcript_archive_dir: docs/sources/transcripts-multipage
  resume_on_existing_run: true
