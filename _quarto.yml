# Quarto Book project config (ADR-024 + ADR-025).
#
# Source-of-truth for `make eda-book`: a multi-chapter Book covering
# all 7 datasets in `data/raw/`. Each chapter is a jupytext `.py:percent`
# file (per `notebook-discipline`) with one `cfg_path` papermill parameter
# (per `horus-config-discipline`).
#
# - HTML output: navigable book at `_book/index.html` with sidebar TOC,
#   chapter numbers, search; Plotly interactive widgets + matplotlib/seaborn
#   static figures.
# - PDF output: archived single document at `_book/Horus-EDA.pdf`;
#   matplotlib/seaborn static figures only (Plotly drops gracefully to
#   static fallbacks per Quarto's documented behavior).
#
# Chapters list grows as Phases B + C land:
#   - Phase A: 00-index.qmd  (pure scaffold; baseline-render verifiable)
#   - Phase B: + 01-zugferd.py  (refactored from experiments/eda-zugferd.py)
#   - Phase C: + 02-fatura2.py + 03-omnidocbench.py + ...
#
# Per-chapter overrides (e.g., `title:` in the chapter's YAML front-matter +
# `params:` for `cfg_path`) layer on top of these project-level defaults.

project:
  type: book
  output-dir: _book

book:
  title: "HORUS — Exploratory Data Analysis"
  subtitle: "Multi-dataset characterization of the HORUS thesis substrate"
  author: "Reebal Sami"
  date: today
  date-format: iso
  chapters:
    - index.qmd
    - experiments/01-zugferd.py
    - experiments/02-fatura2.py
    - experiments/03-omnidocbench.py
    - experiments/04-funsd.py
    - experiments/05-parsee-ai.py
  references: references.qmd
  search: true
  page-navigation: true

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-location: left
    code-fold: true
    code-tools: true
    fig-format: svg
    fig-cap-location: bottom
    fig-responsive: true
    smooth-scroll: true
    embed-resources: false
    number-depth: 2
  pdf:
    documentclass: scrreprt
    papersize: a4
    fontsize: 11pt
    toc: true
    toc-depth: 3
    fig-cap-location: bottom
    fig-format: pdf
    fig-pos: "H"
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=2.5cm
      - right=2.5cm
    colorlinks: true
    number-depth: 2

execute:
  echo: true
  warning: false
  freeze: auto

# Citations + cross-references work out of the box; no per-project bib file
# yet (per-chapter `bibliography:` in YAML front-matter when needed).
